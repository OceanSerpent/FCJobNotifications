name: Amazon SPA4 Job Alert

on:
  schedule:
    - cron: "0,30 * * * *"   # Runs every 30 minutes
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run job alert check
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
        run: python amazon_job_alert.py --once
